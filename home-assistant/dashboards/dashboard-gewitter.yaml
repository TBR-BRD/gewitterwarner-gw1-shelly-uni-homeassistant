# Lovelace Dashboard-Vorlage fuer Gewitterwarner GW1
#
# Diese Datei ist eine Vorlage. Je nach Home-Assistant-Version kann das Dashboard
# ueber die UI oder als YAML-Dashboard eingebunden werden.

title: Gewitter
path: gewitter
icon: mdi:weather-lightning
cards:
  - type: grid
    columns: 2
    square: false
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "### GW1 (eigener Sensor)"

          - type: entities
            title: Status
            show_header_toggle: false
            entities:
              - entity: binary_sensor.gewitterwarnung
                name: Gewitterwarnung
                icon: mdi:weather-lightning
              - entity: binary_sensor.entwarnung
                name: Entwarnung
                icon: mdi:weather-sunny-alert
              - type: divider
              - entity: sensor.gewitterwarner_blitze_heute
                name: Blitze heute
                icon: mdi:counter
              - entity: sensor.gewitterwarner_blitzrate
                name: Blitze pro Minute
                icon: mdi:speedometer

          - type: grid
            columns: 2
            square: false
            cards:
              - type: gauge
                entity: sensor.gewitterwarner_blitzrate
                name: Blitzrate
                min: 0
                max: 10
                severity:
                  green: 0
                  yellow: 1
                  red: 5
              - type: gauge
                entity: sensor.gewitterwarner_blitze_heute
                name: Blitze heute
                min: 0
                max: 500
                severity:
                  green: 0
                  yellow: 50
                  red: 150

          - type: history-graph
            title: Blitzverlauf (24 h)
            hours_to_show: 24
            entities:
              - entity: sensor.gewitterwarner_blitze_heute
                name: Blitze kumuliert

      - type: vertical-stack
        cards:
          - type: markdown
            content: "### Umgebung & amtliche Warnung"

          - type: entities
            title: Blitzortung - Umgebung
            show_header_toggle: false
            entities:
              - entity: sensor.blitzortung_lightning_counter
                name: Blitze Umgebung
                icon: mdi:weather-lightning
              - entity: sensor.blitzortung_lightning_distance
                name: Entfernung
                icon: mdi:map-marker-distance
              - entity: sensor.blitzortung_lightning_azimuth
                name: Richtung
                icon: mdi:compass

          # Optional: Wenn die HACS "Blitzortung Lightning Card" installiert ist,
          # kann diese Karte statt der Entities-Karte genutzt werden. Die genauen
          # Optionen haengen von der installierten Card-Version ab.
          #
          # - type: custom:blitzortung-lightning-card
          #   distance_entity: sensor.blitzortung_lightning_distance
          #   counter_entity: sensor.blitzortung_lightning_counter
          #   azimuth_entity: sensor.blitzortung_lightning_azimuth

          - type: map
            title: Karte
            default_zoom: 12
            entities:
              - zone.home

          - type: markdown
            title: Hinweise
            content: >-
              Ersetze die anonymisierten Entity-Platzhalter durch deine lokalen
              Home-Assistant-Entity-IDs. Pruefe danach, ob die Logik des
              GW1-Eingangs invertiert werden muss.
